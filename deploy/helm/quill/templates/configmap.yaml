{{- range $name, $inst := .Values.instances }}
{{- if $inst.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "quill.fullname" $ }}-{{ $name }}-config
  labels:
    {{- include "quill.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
data:
  config.toml: |
    {{- if $inst.teams.enabled }}
    [teams]
    app_id = "${TEAMS_APP_ID}"
    app_secret = "${TEAMS_APP_SECRET}"
    tenant_id = "${TEAMS_TENANT_ID}"
    listen = {{ $inst.teams.listen | quote }}
    {{- with $inst.teams.allowedUserID }}
    allowed_user_id = {{ toJson . }}
    {{- end }}
    {{- with $inst.teams.allowedChannels }}
    allowed_channels = {{ toJson . }}
    {{- end }}
    {{- end }}

    {{- if $inst.discord.enabled }}
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    {{- with $inst.discord.allowedChannels }}
    allowed_channels = {{ toJson . }}
    {{- end }}
    {{- end }}

    {{- if $inst.telegram.enabled }}
    [telegram]
    bot_token = "${TELEGRAM_BOT_TOKEN}"
    {{- with $inst.telegram.allowedChats }}
    allowed_chats = {{ toJson . }}
    {{- end }}
    {{- end }}

    [agent]
    command = {{ $inst.agent.command | quote }}
    args = {{ toJson $inst.agent.args }}
    working_dir = {{ $inst.agent.workingDir | quote }}

    [pool]
    max_sessions = {{ $.Values.pool.maxSessions }}
    session_ttl_hours = {{ $.Values.pool.sessionTTLHours }}

    {{- if $.Values.api.enabled }}
    [api]
    enabled = true
    listen = {{ $.Values.api.listen | quote }}
    {{- end }}

    {{- with $inst.stt }}
    {{- if .enabled }}

    [stt]
    enabled = true
    provider = {{ .provider | default "openai" | quote }}
    api_key = {{ .apiKey | quote }}
    {{- with .model }}
    model = {{ . | quote }}
    {{- end }}
    {{- with .language }}
    language = {{ . | quote }}
    {{- end }}
    {{- with .prompt }}
    prompt = {{ . | quote }}
    {{- end }}
    {{- with .baseUrl }}
    base_url = {{ . | quote }}
    {{- end }}
    {{- end }}
    {{- end }}

    {{- with $inst.tts }}
    {{- if .enabled }}

    [tts]
    enabled = true
    provider = {{ .provider | default "openai" | quote }}
    api_key = {{ .apiKey | quote }}
    {{- with .model }}
    model = {{ . | quote }}
    {{- end }}
    {{- with .voice }}
    voice = {{ . | quote }}
    {{- end }}
    {{- with .instructions }}
    instructions = {{ . | quote }}
    {{- end }}
    {{- with .style }}
    style = {{ . | quote }}
    {{- end }}
    {{- with .stylePrefix }}
    style_prefix = {{ . | quote }}
    {{- end }}
    {{- with .styleSuffix }}
    style_suffix = {{ . | quote }}
    {{- end }}
    {{- with .voiceGender }}
    voice_gender = {{ . | quote }}
    {{- end }}
    {{- with .baseUrl }}
    base_url = {{ . | quote }}
    {{- end }}
    {{- if .timeoutSec }}
    timeout_sec = {{ .timeoutSec }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
{{- end }}
