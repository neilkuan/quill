{{- range $name, $inst := .Values.instances }}
{{- if $inst.enabled }}
{{- $b := merge (default (dict) $inst.backup) $.Values.backup }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quill.fullname" $ }}-{{ $name }}
  labels:
    {{- include "quill.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: 1
  strategy:
    {{- if $b.enabled }}
    type: Recreate
    {{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  selector:
    matchLabels:
      {{- include "quill.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "quill.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
      annotations:
        checksum/config: {{ toJson $inst | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 60
      {{- if $b.enabled }}
      securityContext:
        fsGroup: {{ $b.ownership.fsGroup }}
      {{- end }}
      {{- if and $b.enabled (or (eq $b.auth.mode "irsa") (eq $b.auth.mode "podIdentity")) }}
      serviceAccountName: {{ include "quill.fullname" $ }}-{{ $name }}
      {{- end }}
      {{- if $b.enabled }}
      initContainers:
        - name: s3-restore
          image: "{{ $b.rclone.image }}:{{ $b.rclone.tag }}"
          imagePullPolicy: {{ $b.rclone.pullPolicy }}
          securityContext:
            runAsUser: {{ $b.ownership.runAsUser }}
            runAsGroup: {{ $b.ownership.runAsGroup }}
            runAsNonRoot: true
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              rclone copy "s3:${BUCKET}/${PREFIX}" /workdir --create-empty-src-dirs $EXTRA_ARGS
          env:
            {{- include "quill.s3.envVars" (dict "ctx" $ "name" $name "b" $b) | nindent 12 }}
          volumeMounts:
            - name: workdir
              mountPath: /workdir
          resources:
            {{- toYaml $b.resources | nindent 12 }}
        - name: s3-backup
          image: "{{ $b.rclone.image }}:{{ $b.rclone.tag }}"
          imagePullPolicy: {{ $b.rclone.pullPolicy }}
          restartPolicy: Always
          securityContext:
            runAsUser: {{ $b.ownership.runAsUser }}
            runAsGroup: {{ $b.ownership.runAsGroup }}
            runAsNonRoot: true
          command:
            - /bin/sh
            - -c
            - exec sleep infinity
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -eu
                    rclone sync /workdir "s3:${BUCKET}/${PREFIX}" --create-empty-src-dirs $EXTRA_ARGS
          env:
            {{- include "quill.s3.envVars" (dict "ctx" $ "name" $name "b" $b) | nindent 12 }}
          volumeMounts:
            - name: workdir
              mountPath: /workdir
          resources:
            {{- toYaml $b.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: quill
          image: "{{ $inst.image.repository }}:{{ $inst.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $inst.image.pullPolicy }}
          args: ["/etc/quill/config.toml"]
          ports:
            - name: teams
              containerPort: 3978
            - name: api
              containerPort: 8080
          envFrom:
            - secretRef:
                name: {{ include "quill.fullname" $ }}-{{ $name }}-secrets
          env:
            - name: QUILL_LOG
              value: {{ $inst.agent.logLevel | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/quill
              readOnly: true
            - name: workdir
              mountPath: {{ $inst.agent.workingDir }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with $inst.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "quill.fullname" $ }}-{{ $name }}-config
        - name: workdir
          emptyDir: {}
{{- end }}
{{- end }}
