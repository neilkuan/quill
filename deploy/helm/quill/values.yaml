# Each instance gets its own Deployment, Service, ConfigMap, and Secret.
# Ingress is shared — all instances route through a single ALB.
instances:
  kiro:
    enabled: true
    image:
      repository: ghcr.io/neilkuan/quill
      tag: ""  # defaults to appVersion
      pullPolicy: IfNotPresent
    agent:
      command: kiro-cli
      args: ["acp", "--trust-all-tools"]
      workingDir: /home/agent
      logLevel: info
    secrets:
      TEAMS_APP_ID: ""
      TEAMS_APP_SECRET: ""
      TEAMS_TENANT_ID: ""
      DISCORD_BOT_TOKEN: ""
      TELEGRAM_BOT_TOKEN: ""
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
    teams:
      enabled: true
      listen: ":3978"
      # Identity gate — overrides allowedChannels when non-empty. Use "*" to allow any user.
      allowedUserID: []
      # Location gate — conversation IDs permitted to talk to the bot.
      allowedChannels: []
    discord:
      enabled: false
      allowedChannels: []
    telegram:
      enabled: false
      allowedChats: []
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

  # -- Example: uncomment to deploy Claude alongside Kiro
  # claude:
  #   enabled: false
  #   image:
  #     repository: ghcr.io/neilkuan/quill-claude
  #     tag: ""
  #     pullPolicy: IfNotPresent
  #   agent:
  #     command: claude-agent-acp
  #     args: []
  #     workingDir: /home/node
  #     logLevel: info
  #   secrets:
  #     DISCORD_BOT_TOKEN: ""
  #     ANTHROPIC_API_KEY: ""
  #   teams:
  #     enabled: false
  #   discord:
  #     enabled: true
  #     allowedChannels: ["1234567890"]
  #   telegram:
  #     enabled: false
  #     allowedChats: []
  #   resources:
  #     requests:
  #       cpu: 250m
  #       memory: 256Mi
  #     limits:
  #       cpu: "1"
  #       memory: 512Mi

# -- Optional S3 backup of agent.workingDir for session continuity.
# Restores on pod start, syncs on graceful shutdown.
# Requires Kubernetes 1.28+ (native sidecar containers).
# Per-instance overrides via `instances.<name>.backup` merge over this default.
backup:
  enabled: false
  s3:
    bucket: ""
    prefix: "quill"        # final S3 path: s3://{bucket}/{prefix}/{instance-name}
    region: us-east-1
    endpoint: ""           # optional, for MinIO / non-AWS S3-compatible
  auth:
    # mode: irsa | podIdentity | secret
    mode: irsa
    irsa:
      roleArn: ""          # set when mode=irsa
    podIdentity: {}        # No fields — association created out-of-band
    secret:
      existingSecret: ""   # name of pre-existing k8s Secret with AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
      accessKeyID: ""      # used only when existingSecret is empty
      secretAccessKey: ""
  rclone:
    image: rclone/rclone
    tag: "1.66"
    pullPolicy: IfNotPresent
    extraArgs: []          # passed to both copy (restore) and sync (backup)
  ownership:
    # UID/GID rclone containers run as. Files restored from S3 are owned by these
    # IDs, so they must match the UID/GID inside the quill main container. All
    # four built-in agent images (kiro, claude, codex, copilot) run as 1000:1000.
    # Override only if you build a custom image with a different runtime user.
    runAsUser: 1000
    runAsGroup: 1000
    # Pod-level fsGroup applied to the shared emptyDir. Kubelet recursively chowns
    # volume contents to this GID at mount time and sets the SGID bit so files
    # created later inherit the GID. Set the same as runAsGroup unless you have a
    # specific reason to differ.
    fsGroup: 1000
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -- Shared settings
pool:
  maxSessions: 10
  sessionTTLHours: 24

api:
  enabled: true
  listen: ":8080"

service:
  type: NodePort

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
  host: ""
