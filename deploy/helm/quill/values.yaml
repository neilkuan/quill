# Each instance gets its own Deployment, Service, ConfigMap, and Secret.
# Ingress is shared — all instances route through a single ALB.
instances:
  kiro:
    enabled: true
    image:
      repository: ghcr.io/neilkuan/quill
      tag: ""  # defaults to appVersion
      pullPolicy: IfNotPresent
    agent:
      command: kiro-cli
      args: ["acp", "--trust-all-tools"]
      workingDir: /home/agent
      logLevel: info
    secrets:
      TEAMS_APP_ID: ""
      TEAMS_APP_SECRET: ""
      TEAMS_TENANT_ID: ""
      DISCORD_BOT_TOKEN: ""
      TELEGRAM_BOT_TOKEN: ""
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
    teams:
      enabled: true
      listen: ":3978"
    discord:
      enabled: false
      allowedChannels: []
    telegram:
      enabled: false
      allowedChats: []
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

  # -- Example: uncomment to deploy Claude alongside Kiro
  # claude:
  #   enabled: false
  #   image:
  #     repository: ghcr.io/neilkuan/quill-claude
