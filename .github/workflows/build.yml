name: Build & Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
      version: ${{ steps.check.outputs.version }}
      promote_from: ${{ steps.check.outputs.promote_from }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag type
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "promote_from=" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            # Find latest pre-release for this version
            LATEST_RC=$(git tag --list "${TAG}-*" --sort=-version:refname | head -1)
            echo "promote_from=${LATEST_RC}" >> "$GITHUB_OUTPUT"
          fi

  # --- Pre-release: full build ---
  build-image:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.is_prerelease == 'true'
    strategy:
      matrix:
        variant:
          - { suffix: "", dockerfile: "Dockerfile", artifact: "default" }
          - { suffix: "-codex", dockerfile: "Dockerfile.codex", artifact: "codex" }
          - { suffix: "-claude", dockerfile: "Dockerfile.claude", artifact: "claude" }
          - { suffix: "-copilot", dockerfile: "Dockerfile.copilot", artifact: "copilot" }
          - { suffix: "-gemini", dockerfile: "Dockerfile.gemini", artifact: "gemini" }
        platform:
          - { os: linux/amd64, runner: ubuntu-latest }
          - { os: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.platform.os }}
          build-args: |
            COMMIT=${{ github.sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}:cache-${{ matrix.platform.runner }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}:cache-${{ matrix.platform.runner }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant.artifact }}-${{ matrix.platform.runner }}
          path: /tmp/digests/*
          retention-days: 1

  merge-manifests:
    needs: [resolve-tag, build-image]
    if: needs.resolve-tag.outputs.is_prerelease == 'true'
    strategy:
      matrix:
        variant:
          - { suffix: "", artifact: "default" }
          - { suffix: "-codex", artifact: "codex" }
          - { suffix: "-claude", artifact: "claude" }
          - { suffix: "-copilot", artifact: "copilot" }
          - { suffix: "-gemini", artifact: "gemini" }
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant.artifact }}-*
          merge-multiple: true
          digest-mismatch: warn

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}},value=${{ needs.resolve-tag.outputs.version }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}@sha256:%s ' *)

  # --- Both pre-release & stable: ensure GitHub Release exists before uploading binaries ---
  ensure-release:
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE="${{ needs.resolve-tag.outputs.is_prerelease }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to create."
            exit 0
          fi

          ARGS=(--title "$TAG" --generate-notes)
          if [ "$IS_PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          else
            ARGS+=(--latest)
          fi

          gh release create "$TAG" "${ARGS[@]}"

  # --- Both pre-release & stable: cross-compile Go binaries and attach to GitHub Release ---
  release-binaries:
    needs: [resolve-tag, ensure-release]
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: darwin,  goarch: arm64, ext: ""     }
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: arm64, ext: ""     }
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build & package binary
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="quill-${TAG}-${{ matrix.target.goos }}-${{ matrix.target.goarch }}"
          BIN="${DIR}/quill${{ matrix.target.ext }}"
          mkdir -p "$DIR"

          go build -trimpath \
            -ldflags="-s -w -X main.commit=$(git rev-parse --short HEAD)" \
            -o "$BIN" .

          cp README.md README-zh-tw.md LICENSE config.toml.example "$DIR/"

          if [ "${{ matrix.target.goos }}" = "windows" ]; then
            ARCHIVE="${DIR}.zip"
            zip -r "$ARCHIVE" "$DIR"
          else
            ARCHIVE="${DIR}.tar.gz"
            tar -czf "$ARCHIVE" "$DIR"
          fi

          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" "$ARCHIVE" "${ARCHIVE}.sha256" --clobber

  # --- Pre-release: push Helm chart as OCI artifact ---
  push-chart:
    needs: [resolve-tag, merge-manifests]
    if: needs.resolve-tag.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin

      - name: Package and push chart
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"
          # Set chart version + appVersion to match the release
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/quill/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/quill/Chart.yaml

          cat deploy/helm/quill/Chart.yaml
          helm package deploy/helm/quill
          ls -la quill-*.tgz
          helm push quill-${VERSION}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  # --- Stable release: promote pre-release image (no rebuild) ---
  promote-stable:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.is_prerelease == 'false'
    strategy:
      matrix:
        variant:
          - { suffix: "" }
          - { suffix: "-codex" }
          - { suffix: "-claude" }
          - { suffix: "-copilot" }
          - { suffix: "-gemini" }
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote pre-release to stable
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"
          PROMOTE_FROM="${{ needs.resolve-tag.outputs.promote_from }}"
          PROMOTE_FROM_VERSION="${PROMOTE_FROM#v}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}"

          echo "Promoting ${IMAGE}:${PROMOTE_FROM_VERSION} → ${VERSION}"
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${VERSION%.*}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${PROMOTE_FROM_VERSION}"

  # --- Stable release: promote pre-release Helm chart (no rebuild) ---
  promote-chart:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin

      - name: Promote pre-release chart to stable
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"
          PROMOTE_FROM="${{ needs.resolve-tag.outputs.promote_from }}"
          PROMOTE_FROM_VERSION="${PROMOTE_FROM#v}"
          CHART_REPO="oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"

          if [ -z "$PROMOTE_FROM_VERSION" ]; then
            echo "::error::No pre-release chart to promote (promote_from is empty). Push an RC tag first."
            exit 1
          fi

          echo "Promoting chart ${PROMOTE_FROM_VERSION} → ${VERSION}"
          mkdir -p chart-src
          helm pull "${CHART_REPO}/quill" --version "${PROMOTE_FROM_VERSION}" --untar --untardir chart-src

          sed -i "s/^version:.*/version: ${VERSION}/" chart-src/quill/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart-src/quill/Chart.yaml

          cat chart-src/quill/Chart.yaml
          helm package chart-src/quill
          ls -la quill-*.tgz
          helm push "quill-${VERSION}.tgz" "${CHART_REPO}"

